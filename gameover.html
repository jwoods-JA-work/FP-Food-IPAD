<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #22404d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        .gameover-container {
            text-align: center;
        }
        h1 {
            font-size: 100px;
            color: #e5556c;
            margin: 0;
            text-shadow: 5px 5px 0px #000;
            font-family: 'Montserrat', sans-serif;
        }
        p {
            font-size: 30px;
            margin: 20px 0;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
        }
        .retry-btn {
            margin-top: 30px;
            padding: 20px 60px;
            background: #e5556c;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0px 6px 0px #8b2b3a;
            font-family: 'Montserrat', sans-serif;
        }
        .retry-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px;
        }
    </style>
</head>
<body>
    <div class="gameover-container">
        <h1>GAME OVER</h1>
        <p>You ran out of money! Being a foodie is expensive.</p>
        <button class="retry-btn" onclick="localStorage.setItem('budget',60); location.href='day1.html';">RETRY MISSION</button>
    </div>
</body>
</html>
