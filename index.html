<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Finance Park Grocery Game</title>

        <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
        <link href="https://googleapis.com" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="start-screen">
            <div class="start-card">
                <h1>
                    Food Budget Crisis      
                </h1>

                <p>
                    You have $60. 3 Days. Make it last.
                </p>

                <button onclick = "startGame()">START</button>
            </div>
        </div>

        <div id = "mission-screen" style = "display: none;">
            <div class = "mission-card">
                <h1>
                    Mission
                </h1>
                <h2>
                    Survive the Week
                </h2>

                <p>
                    After a long day, you finally get home <br>
                    You check your wallet... only $60 left. <br>
                    Your kitchen is nearly empty. <br>
                    You need to make this last 3 days.
                </p>

                <img src="Images/next.png" class="next-button" id="mission-next" onclick="clickNotePage()">
            </div>
        </div>

        <script src = "game.js"></script>
    </body>
</html>
