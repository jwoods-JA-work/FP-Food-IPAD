<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory!</title>
    <link href="https://fonts.googleapis.com/css?family=Wendy+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allan&family=Sanchez&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #22404d;
            font-family: 'Monstserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .victory-container {
            text-align: center;
            background: white;
            padding: 50px;
            border: 8px solid #00763d;
            border-radius: 30px;
            box-shadow: 15px 15px 0px #122316;
            max-width: 600px;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: #00763d;
            font-size: 80px;
            margin: 0;
        }
        p {
            font-size: 24px;
            font-family: 'Roboto Condensed', sans-serif;
            color: #22404d;
            margin: 20px 0;
        }
        .code-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .code {
            background: #00c0ca;
            border: 3px dashed #144a7b;
            padding: 15px 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            color: #ffffff;
        }
        .restart-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: #22404d;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            cursor: pointer;
        }
        .replay-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: #22404d;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            cursor: pointer;            
        }
    </style>
</head>
<body>
    <div class="victory-container">
        <h1>VICTORY!</h1>
        <p>Congratulations! You managed your money wisely and survived the week without going broke.</p>
        <div class="code-box">
            <div class="code">Grocery Code: 978</div>
            <div class="code">Dining Out Code: 918</div>
        </div>
        <button class="restart-btn" onclick="location.href='index.html'">GO TO HOME SCREEN</button>
        <button class="replay-btn" onclick="localStorage.setItem('budget', 60); location.href='day1.html';">START AGAIN AT DAY ONE</button>        
    </div>
</body>
</html>
